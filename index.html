<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagVerse | Home Official</title>
    <script>
        (function() {
            if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: { extend: { colors: { indigo: { 600: '#4f46e5' } } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        html.dark body { background-color: #0f172a; }
        .transition-all { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 dark:text-white transition-all min-h-screen">

    <nav class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-md sticky top-0 z-50 border-b dark:border-gray-800 shadow-sm font-bold">
        <div class="container mx-auto px-2 py-3 md:px-4 md:py-4 flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-black text-indigo-600 cursor-pointer tracking-tighter shrink-0 mr-2" onclick="location.href='index.html'">
                BAGVERSE.
            </h1>
            <div class="flex items-center gap-2 sm:gap-4 md:gap-6 text-[9px] xs:text-[10px] md:text-sm">
                <a href="index.html" class="text-indigo-600 border-b-2 border-indigo-600 whitespace-nowrap">Beranda</a>
                <a href="wishlist.html" class="opacity-60 hover:opacity-100 transition whitespace-nowrap">Wishlist</a>
                <a href="history.html" class="opacity-60 hover:opacity-100 transition whitespace-nowrap">Riwayat</a>
                <a href="cart.html" class="relative text-base md:text-xl shrink-0 ml-1">
                    👜 <span id="cart-count" class="absolute -top-1 -right-2 bg-red-500 text-white text-[8px] px-1 rounded-full font-bold border border-white dark:border-gray-800">0</span>
                </a>
                <div id="nav-auth" class="shrink-0"></div>
                <button onclick="toggleTheme()" class="p-1.5 md:p-2 bg-gray-100 dark:bg-gray-700 rounded-lg md:rounded-xl text-xs">🌓</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6 md:py-8">
        <div class="flex flex-col md:flex-row gap-3 md:gap-4 mb-8 md:mb-10">
            <div class="relative flex-1 group">
                <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none z-10">
                    <span class="text-sm opacity-30">🔍</span>
                </div>
                <input type="text" id="search" placeholder="Cari tas impianmu..." 
                    class="w-full p-3 md:p-4 !pl-14 rounded-2xl bg-white dark:bg-gray-800 border-none shadow-md outline-none focus:ring-2 focus:ring-indigo-500 transition text-sm">
            </div>
            
            <div class="flex gap-2 w-full md:w-auto">
                <select id="filter-cat" class="flex-1 md:w-40 p-3 md:p-4 rounded-2xl bg-white dark:bg-gray-800 border-none shadow-md outline-none font-bold cursor-pointer text-[11px] md:text-sm">
                    <option value="">Semua Kategori</option>
                    <option value="Pria">Pria</option>
                    <option value="Wanita">Wanita</option>
                    <option value="Unisex">Unisex</option>
                </select>

                <select id="sort-price" class="flex-1 md:w-40 p-3 md:p-4 rounded-2xl bg-white dark:bg-gray-800 border-none shadow-md outline-none font-bold cursor-pointer text-[11px] md:text-sm text-indigo-600">
                    <option value="default">Urutan</option>
                    <option value="cheap">Termurah</option>
                    <option value="expensive">Termahal</option>
                </select>
            </div>
        </div>

        <div id="product-grid" class="grid grid-cols-2 lg:grid-cols-3 gap-3 md:gap-8 mb-12"></div>

        <div id="pagination" class="flex justify-center items-center gap-4 md:gap-6 pb-10">
            <button id="prev-page" class="bg-white dark:bg-gray-800 px-4 py-2 md:px-6 md:py-2 rounded-xl shadow-md font-bold text-xs md:text-sm disabled:opacity-20 transition active:scale-90 border dark:border-gray-700">Prev</button>
            <span id="page-info" class="font-black text-[9px] md:text-xs uppercase opacity-40 tracking-widest text-center">Page 1 of 1</span>
            <button id="next-page" class="bg-white dark:bg-gray-800 px-4 py-2 md:px-6 md:py-2 rounded-xl shadow-md font-bold text-xs md:text-sm disabled:opacity-20 transition active:scale-90 border dark:border-gray-700">Next</button>
        </div>
    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 translate-y-40 opacity-0 transition-all duration-500"></div>

    <script type="module">
        import { Store, showToast } from './app.js';
        Store.initTheme();

        let currentPage = 1;
        const productsPerPage = 6;

        async function render() {
            const products = await Store.getProducts();
            const q = document.getElementById('search').value.toLowerCase();
            const fCat = document.getElementById('filter-cat').value;
            const sortVal = document.getElementById('sort-price').value;
            const container = document.getElementById('product-grid');

            updateNav();

            let filtered = products.filter(p => {
                const matchSearch = p.name.toLowerCase().includes(q);
                const matchCat = fCat === "" || p.category === fCat;
                return matchSearch && matchCat;
            });

            if (sortVal === "cheap") filtered.sort((a, b) => a.price - b.price);
            else if (sortVal === "expensive") filtered.sort((a, b) => b.price - a.price);

            const totalPages = Math.ceil(filtered.length / productsPerPage) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            const start = (currentPage - 1) * productsPerPage;
            const paginatedItems = filtered.slice(start, start + productsPerPage);

            document.getElementById('page-info').innerText = `Page ${currentPage} of ${totalPages}`;
            document.getElementById('prev-page').disabled = (currentPage === 1);
            document.getElementById('next-page').disabled = (currentPage === totalPages);

            if (paginatedItems.length === 0) {
                container.innerHTML = `<div class="col-span-full py-20 text-center opacity-30 font-bold italic">Produk tidak ditemukan...</div>`;
                return;
            }

            container.innerHTML = paginatedItems.map(p => {
                const isWish = Store.getWishlist().some(x => x.id === p.id);
                return `
                <div class="bg-white dark:bg-gray-800 p-3 md:p-4 rounded-[24px] md:rounded-[32px] shadow-sm hover:shadow-xl transition-all duration-300 group border dark:border-gray-700 flex flex-col relative">
                    <button onclick="handleWish(${p.id})" class="absolute top-4 right-4 z-10 p-1.5 md:p-2 rounded-full bg-white/80 dark:bg-gray-700/80 shadow-sm hover:scale-110 transition active:scale-90">
                        <span class="${isWish ? 'text-red-500' : 'text-gray-400'} text-xs md:text-base">${isWish ? '❤️' : '🤍'}</span>
                    </button>
                    
                    <div onclick="location.href='detail.html?id=${p.id}'" class="cursor-pointer h-36 md:h-64 overflow-hidden rounded-xl md:rounded-2xl mb-3 md:mb-4 bg-gray-100 dark:bg-gray-700">
                        <img src="${p.image}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                    </div>
                    
                    <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-1">
                        <span class="text-[8px] md:text-[10px] font-black text-indigo-500 uppercase tracking-widest">${p.category || 'Unisex'}</span>
                        <span class="text-[8px] md:text-xs text-yellow-500">${'⭐'.repeat(p.rating || 5)}</span>
                    </div>

                    <h3 onclick="location.href='detail.html?id=${p.id}'" class="cursor-pointer font-bold text-xs md:text-lg leading-tight mb-1 md:mb-2 line-clamp-1">${p.name}</h3>
                    
                    <p class="text-[9px] md:text-xs opacity-60 mb-3 md:mb-6 line-clamp-2 min-h-[24px] md:min-h-[32px]">${p.description || 'Premium collection.'}</p>
                    
                    <div class="mt-auto flex flex-col md:flex-row gap-2 md:justify-between md:items-center">
                        <span class="font-black text-indigo-600 text-xs md:text-xl">Rp ${p.price.toLocaleString('id-ID')}</span>
                        <button onclick="addCart(${p.id})" class="bg-indigo-600 text-white w-full md:w-auto px-3 py-1.5 md:px-6 md:py-2 rounded-lg md:rounded-xl font-bold text-[10px] md:text-sm hover:bg-indigo-700 active:scale-95 transition">Add</button>
                    </div>
                </div>`;
            }).join('');
        }

        window.addCart = async (id) => {
            const all = await Store.getProducts();
            const p = all.find(x => x.id === id);
            let cart = Store.getCart();
            const exist = cart.find(x => x.id === id);
            if(exist) exist.qty++; else cart.push({...p, qty: 1});
            Store.saveCart(cart);
            showToast("🛍️ Berhasil ditambah!");
            updateNav();
        };

        window.handleWish = async (id) => {
            const all = await Store.getProducts();
            const p = all.find(x => x.id === id);
            const res = Store.toggleWishlist(p);
            showToast(res.action === 'added' ? "❤️ Tersimpan!" : "💔 Dihapus");
            render();
        };

        window.toggleTheme = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

        function updateNav() {
            document.getElementById('cart-count').innerText = Store.getCart().length;
            const user = Store.getUser();
            const navAuth = document.getElementById('nav-auth');
            if (user) {
                // Sekarang hanya Logout, tombol ADM dihapus karena Admin langsung login ke Dashboard
                navAuth.innerHTML = `
                    <div class="flex items-center">
                        <button onclick="logout()" class="text-red-500 font-bold uppercase text-[9px] md:text-[10px]">Logout</button>
                    </div>`;
            } else {
                navAuth.innerHTML = `<a href="login.html" class="bg-indigo-600 text-white px-2 py-1 rounded-md text-[9px] font-bold">Login</a>`;
            }
        }

        document.getElementById('prev-page').onclick = () => { if(currentPage > 1) { currentPage--; render(); window.scrollTo({top: 0, behavior: 'smooth'}); } };
        document.getElementById('next-page').onclick = () => { currentPage++; render(); window.scrollTo({top: 0, behavior: 'smooth'}); };

        const resetPage = () => { currentPage = 1; render(); };
        document.getElementById('search').oninput = resetPage;
        document.getElementById('filter-cat').onchange = resetPage;
        document.getElementById('sort-price').onchange = resetPage;

        window.logout = Store.logout;
        render(); 
    </script>

    <div id="footer-placeholder"></div>

    <script>
        fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            });
    </script>

</body>
</html>
