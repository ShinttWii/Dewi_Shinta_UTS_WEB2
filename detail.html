<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagVerse | Detail Produk</title>
    <script>
        (function() {
            if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: { extend: { colors: { indigo: { 600: '#4f46e5' } } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        html.dark body { background-color: #0f172a; }
        .transition-all { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 dark:text-white transition-all min-h-screen">

    <nav class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-md sticky top-0 z-50 border-b dark:border-gray-800 shadow-sm font-bold">
        <div class="container mx-auto px-2 py-3 md:px-4 md:py-4 flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-black text-indigo-600 cursor-pointer tracking-tighter shrink-0 mr-2" onclick="location.href='index.html'">
                BAGVERSE.
            </h1>
            <div class="flex items-center gap-2 sm:gap-4 md:gap-6 text-[9px] xs:text-[10px] md:text-sm">
                <a href="index.html" class="opacity-60 hover:opacity-100 transition whitespace-nowrap">Beranda</a>
                <a href="wishlist.html" class="opacity-60 hover:opacity-100 transition whitespace-nowrap">Wishlist</a>
                <a href="history.html" class="opacity-60 hover:opacity-100 transition whitespace-nowrap">Riwayat</a>
                <a href="cart.html" class="relative text-base md:text-xl shrink-0 ml-1">
                    👜 <span id="cart-count" class="absolute -top-1 -right-2 bg-red-500 text-white text-[8px] px-1 rounded-full font-bold border border-white dark:border-gray-800">0</span>
                </a>
                <div id="nav-auth" class="shrink-0"></div>
                <button onclick="toggleTheme()" class="p-1.5 md:p-2 bg-gray-100 dark:bg-gray-700 rounded-lg md:rounded-xl text-xs">🌓</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-4 md:py-12 max-w-5xl">
        <div id="detail-container" class="grid md:grid-cols-2 gap-6 md:gap-12 items-start">
            <div class="col-span-full text-center py-20 opacity-50 font-bold">Memuat...</div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 translate-y-40 opacity-0 transition-all duration-500 z-[100]"></div>

    <script type="module">
        import { Store, showToast } from './app.js';
        Store.initTheme();

        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id'));

        async function renderDetail() {
            const products = await Store.getProducts();
            const p = products.find(x => x.id === productId);
            const container = document.getElementById('detail-container');
            
            updateNav();

            if (!p) {
                container.innerHTML = `<div class="col-span-full text-center py-20 font-bold">Produk tidak ditemukan.</div>`;
                return;
            }

            container.innerHTML = `
                <div class="relative">
                    <div class="h-72 md:h-auto aspect-square overflow-hidden rounded-[24px] md:rounded-[48px] bg-white dark:bg-gray-800 border dark:border-gray-700 shadow-lg">
                        <img src="${p.image}" class="w-full h-full object-cover">
                    </div>
                </div>

                <div class="flex flex-col">
                    <div class="mb-1 md:mb-2">
                        <span class="text-[8px] md:text-[10px] font-black text-indigo-500 uppercase tracking-widest bg-indigo-50 dark:bg-indigo-900/30 px-2 py-0.5 rounded-full">${p.category}</span>
                    </div>
                    
                    <h2 class="text-2xl md:text-5xl font-black tracking-tighter mb-2 md:mb-4 leading-tight">${p.name}</h2>
                    
                    <div class="flex items-center gap-3 mb-4 md:mb-6">
                        <span class="text-lg md:text-3xl font-black text-indigo-600">Rp ${p.price.toLocaleString('id-ID')}</span>
                        <div class="h-4 w-[1px] bg-gray-300 dark:bg-gray-700"></div>
                        <span class="text-yellow-500 font-bold text-xs md:text-base">${'⭐'.repeat(p.rating || 5)}</span>
                    </div>

                    <p class="text-xs md:text-lg opacity-60 leading-relaxed mb-6 md:mb-8">
                        ${p.description || 'Koleksi premium BagVerse. Didesain estetik dan fungsional untuk menunjang aktivitas harianmu.'}
                    </p>

                    <div class="flex gap-2 md:gap-4">
                        <button onclick="addToCartDetail()" class="flex-[4] bg-indigo-600 text-white py-3 md:py-5 rounded-xl md:rounded-[24px] font-black text-xs md:text-lg shadow-lg shadow-indigo-500/20 active:scale-95 transition-all">
                            Tambah Keranjang 👜
                        </button>
                        <button onclick="handleWishDetail()" class="flex-1 bg-white dark:bg-gray-800 border dark:border-gray-700 py-3 rounded-xl md:rounded-[24px] shadow-sm active:scale-95 transition-all flex items-center justify-center text-base md:text-xl">
                            ${Store.getWishlist().some(x => x.id === productId) ? '❤️' : '🤍'}
                        </button>
                    </div>

                    <div class="mt-6 grid grid-cols-3 gap-2 border-t dark:border-gray-800 pt-6">
                        <div class="text-center">
                            <p class="text-[8px] font-black opacity-30 uppercase mb-0.5">Kondisi</p>
                            <p class="font-bold text-[10px] md:text-xs">Baru</p>
                        </div>
                        <div class="text-center border-x dark:border-gray-800">
                            <p class="text-[8px] font-black opacity-30 uppercase mb-0.5">Berat</p>
                            <p class="font-bold text-[10px] md:text-xs">500g</p>
                        </div>
                        <div class="text-center">
                            <p class="text-[8px] font-black opacity-30 uppercase mb-0.5">Cicilan</p>
                            <p class="font-bold text-[10px] md:text-xs">0%</p>
                        </div>
                    </div>
                </div>
            `;
        }

        window.addToCartDetail = async () => {
            const all = await Store.getProducts();
            const p = all.find(x => x.id === productId);
            let cart = Store.getCart();
            const exist = cart.find(x => x.id === productId);
            if(exist) exist.qty++; else cart.push({...p, qty: 1});
            Store.saveCart(cart);
            showToast("🛍️ Berhasil ditambah!");
            updateNav();
        };

        window.handleWishDetail = async () => {
            const all = await Store.getProducts();
            const p = all.find(x => x.id === productId);
            const res = Store.toggleWishlist(p);
            showToast(res.action === 'added' ? "❤️ Tersimpan!" : "💔 Dihapus");
            renderDetail();
        };

        window.toggleTheme = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

        function updateNav() {
            document.getElementById('cart-count').innerText = Store.getCart().length;
            const user = Store.getUser();
            const navAuth = document.getElementById('nav-auth');
            if (user) {
                navAuth.innerHTML = `
                    <div class="flex items-center gap-1.5 md:gap-3">
                        ${user.role === 'admin' ? `<a href="admin.html" class="bg-black text-white px-1.5 py-0.5 rounded text-[8px] font-black tracking-tighter">ADM</a>` : ''}
                        <button onclick="logout()" class="text-red-500 font-bold uppercase text-[9px] md:text-[10px]">Logout</button>
                    </div>`;
            } else {
                navAuth.innerHTML = `<a href="login.html" class="bg-indigo-600 text-white px-2 py-1 rounded-md text-[9px] font-bold">Login</a>`;
            }
        }

        window.logout = Store.logout;
        renderDetail();
    </script>

    <div id="footer-placeholder"></div>

<script>
    // Fungsi panggil file footer eksternal
    fetch('footer.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('footer-placeholder').innerHTML = data;
        });
</script>

</body>
</html>
