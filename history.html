<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagVerse | Riwayat Belanja</title>
    <script>
        (function() {
            if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: { extend: { colors: { indigo: { 600: '#4f46e5' } } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        html.dark body { background-color: #0f172a; }
        .transition-all { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 dark:text-white transition-all min-h-screen">
    
    <nav class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-md sticky top-0 z-50 border-b dark:border-gray-800 shadow-sm font-bold">
        <div class="container mx-auto px-2 py-3 md:px-4 md:py-4 flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-black text-indigo-600 cursor-pointer tracking-tighter shrink-0 mr-2" onclick="location.href='index.html'">
                BAGVERSE.
            </h1>
            <div class="flex items-center gap-2 sm:gap-4 md:gap-6 text-[9px] xs:text-[10px] md:text-sm">
                <a href="index.html" class="opacity-60 hover:opacity-100 transition whitespace-nowrap">Beranda</a>
                <a href="wishlist.html" class="opacity-60 hover:opacity-100 transition whitespace-nowrap">Wishlist</a>
                <a href="history.html" class="text-indigo-600 border-b-2 border-indigo-600 whitespace-nowrap">Riwayat</a>
                <a href="cart.html" class="relative text-base md:text-xl shrink-0 ml-1">
                    👜 <span id="cart-count" class="absolute -top-1 -right-2 bg-red-500 text-white text-[8px] px-1 rounded-full font-bold border border-white dark:border-gray-800">0</span>
                </a>
                <div id="nav-auth" class="shrink-0"></div>
                <button onclick="toggleTheme()" class="p-1.5 md:p-2 bg-gray-100 dark:bg-gray-700 rounded-lg md:rounded-xl text-xs">🌓</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6 md:py-10 max-w-2xl">
        <div class="mb-6 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <header class="text-center md:text-left">
                <h2 class="text-2xl md:text-3xl font-black italic uppercase tracking-tighter">Pesanan Saya</h2>
                <p class="text-[10px] opacity-50 font-bold uppercase tracking-widest">Riwayat transaksi kamu</p>
            </header>
            
           <div class="relative w-full md:w-64 group">
    <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none z-10">
        <span class="text-sm opacity-30">🔍</span>
    </div>
    
    <input type="text" id="search-history" placeholder="Cari pesanan..." 
        class="w-full p-2.5 md:p-3 !pl-14 rounded-xl bg-white dark:bg-gray-800 border dark:border-gray-700 shadow-sm outline-none text-xs focus:ring-2 focus:ring-indigo-500 transition-all">
</div>
        </div>

        <div id="order-history-list" class="space-y-3 md:space-y-6"></div>
    </main>

    <script type="module">
        import { Store } from './app.js';
        Store.initTheme();

        const user = Store.getUser();
        if(!user) window.location.href = 'login.html';

        function renderHistory() {
            const container = document.getElementById('order-history-list');
            const query = document.getElementById('search-history').value.toLowerCase();
            const allOrders = JSON.parse(localStorage.getItem('orders')) || [];
            
            updateNav();

            let myOrders = allOrders.filter(o => o.userEmail === user.email);
            if (query) {
                myOrders = myOrders.filter(order => 
                    order.items.some(item => item.name.toLowerCase().includes(query))
                );
            }
            myOrders.reverse();

            if(myOrders.length === 0) {
                container.innerHTML = `
                    <div class="p-10 text-center bg-white dark:bg-gray-800 rounded-[30px] border-2 border-dashed dark:border-gray-700 opacity-40">
                        <p class="text-3xl mb-2">🔍</p>
                        <p class="text-xs italic font-bold">Belum ada riwayat pesanan.</p>
                    </div>`;
                return;
            }

            container.innerHTML = myOrders.map(o => `
                <div class="bg-white dark:bg-gray-800 p-4 md:p-7 rounded-[24px] md:rounded-[40px] border dark:border-gray-700 shadow-sm space-y-3 md:space-y-5">
                    <div class="flex justify-between items-center border-b dark:border-gray-700 pb-2.5">
                        <div>
                            <span class="text-[8px] md:text-[10px] font-black bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300 px-2 py-0.5 rounded tracking-tighter">#${(o.orderId || o.id).toString().slice(-8)}</span>
                            <p class="text-[9px] opacity-50 mt-1 font-medium">${o.date}</p>
                        </div>
                        <span class="text-[8px] md:text-[10px] font-black text-emerald-500 bg-emerald-50 dark:bg-emerald-900/20 px-2 py-0.5 rounded-full uppercase">Selesai</span>
                    </div>

                    <div class="space-y-2">
                        ${o.items.map(item => `
                            <div class="flex justify-between items-center text-[10px] md:text-xs">
                                <div class="flex items-center gap-2.5">
                                    <img src="${item.image}" onerror="this.src='https://placehold.co/100x100?text=Bag'" class="w-8 h-8 md:w-12 md:h-12 rounded-lg object-cover">
                                    <div class="max-w-[140px] md:max-w-none">
                                        <p class="font-bold truncate leading-tight">${item.name}</p>
                                        <p class="text-[8px] md:text-[10px] opacity-50">${item.qty} pcs • Rp ${item.price.toLocaleString('id-ID')}</p>
                                    </div>
                                </div>
                                <span class="font-black shrink-0">Rp ${(item.price * item.qty).toLocaleString('id-ID')}</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="grid grid-cols-2 gap-2 bg-slate-50 dark:bg-slate-900/50 p-3 rounded-xl md:rounded-2xl border dark:border-gray-700 text-[9px] md:text-[10px]">
                        <div>
                            <p class="opacity-40 font-black uppercase mb-0.5">Tujuan</p>
                            <p class="font-bold truncate">${o.shipping.name || user.name}</p>
                        </div>
                        <div class="text-right border-l dark:border-gray-700 pl-2">
                            <p class="opacity-40 font-black uppercase mb-0.5">Metode</p>
                            <p class="font-bold uppercase">${o.payment || 'Transfer'}</p>
                        </div>
                    </div>

                    <div class="flex justify-between items-center pt-1">
                        <p class="text-[10px] md:text-xs font-bold opacity-40 uppercase">Total Bayar</p>
                        <p class="text-lg md:text-xl font-black text-indigo-600 tracking-tight">Rp ${o.totalPrice.toLocaleString('id-ID')}</p>
                    </div>
                </div>
            `).join('');
        }

        window.toggleTheme = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

        function updateNav() {
            const cart = Store.getCart();
            document.getElementById('cart-count').innerText = cart.length;
            const navAuth = document.getElementById('nav-auth');
            if (user) {
                navAuth.innerHTML = `
                    <div class="flex items-center gap-1.5 md:gap-3">
                        ${user.role === 'admin' ? `<a href="admin.html" class="bg-black text-white px-1.5 py-0.5 rounded text-[8px] font-black tracking-tighter">ADM</a>` : ''}
                        <button onclick="logout()" class="text-red-500 font-bold uppercase text-[9px] md:text-[10px]">Logout</button>
                    </div>`;
            } else {
                navAuth.innerHTML = `<a href="login.html" class="bg-indigo-600 text-white px-2 py-1 rounded-md text-[9px] font-bold">Login</a>`;
            }
        }

        document.getElementById('search-history').addEventListener('input', renderHistory);
        window.logout = Store.logout;
        renderHistory();
    </script>

    <div id="footer-placeholder"></div>

<script>
    // Fungsi panggil file footer eksternal
    fetch('footer.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('footer-placeholder').innerHTML = data;
        });
</script>

</body>
</html>
